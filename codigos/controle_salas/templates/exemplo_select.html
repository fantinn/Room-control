<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exemplo SELECT</title>
</head>
<body>
    <h1>Salas cadastradas</h1>
    <ul>
        {% for sala in salas %}
            <li>{{ sala['nome'] }} - Capacidade: {{ sala['capacidade'] }}</li>
        {% else %}
            <li>Nenhuma sala cadastrada.</li>
        {% endfor %}
    </ul>
</body>
</html>
